<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BytesCookies</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Login Form -->
    <div id="loginForm" class="form-container">
      <h2>Login to BytesCookies</h2>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter your email">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password">
      </div>
      <div id="loginError" class="error-message" style="display: none;"></div>
      <div class="button-group">
        <button id="loginBtn" class="btn btn-primary">Login</button>
        <button id="registerBtn" class="btn btn-secondary">Register</button>
      </div>
    </div>

    <!-- Main Interface (hidden by default) -->
    <div id="mainInterface" class="main-container" style="display: none;">
      <!-- User Info -->
      <div class="user-info">
        <img id="userAvatar" src="icons/avatar.png" alt="User Avatar" width="32" height="32">
        <span id="userEmail" class="user-email"></span>
      </div>

      <!-- Cookie Management -->
      <div class="cookie-management">
        <h3>Cookie Management</h3>
        <div class="button-group">
          <button id="refreshCookiesBtn" class="btn btn-primary">Refresh Cookies</button>
          <button id="clearCookiesBtn" class="btn btn-danger">Clear All</button>
        </div>
        <div id="cookieList" class="cookie-list">
          <!-- Cookie items will be dynamically added here -->
        </div>
      </div>

      <!-- Settings -->
      <div class="settings">
        <h3>Settings</h3>
        <div class="form-group">
          <label for="autoRefresh">Auto Refresh</label>
          <input type="checkbox" id="autoRefresh">
        </div>
        <div class="form-group">
          <label for="refreshInterval">Refresh Interval (minutes)</label>
          <input type="number" id="refreshInterval" min="1" max="60" value="5">
        </div>
      </div>

      <!-- Logout Button -->
      <div class="button-group">
        <button id="logoutBtn" class="btn btn-secondary">Logout</button>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
